<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOLD</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080808">
    <style>
        body {
            background: #080808;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh; min-height: 100dvh;
            margin: 0; color: #fff; user-select: none;
        }
        .screen { position: absolute; width: 100%; max-width: 430px; height: 100%; display: flex; flex-direction: column; transition: opacity 0.2s; }
        .hidden { display: none !important; }
        
        /* Collection Grid Styles */
        #collection-screen { background: #000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .col-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 20px 100px; }
        .col-card { 
            aspect-ratio: 0.7; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 15px;
        }
        .col-card-name { font-weight: 700; font-size: 14px; margin-top: 10px; text-transform: uppercase; }
        .col-card-rarity { font-size: 10px; opacity: 0.6; }
        
        /* Modal Styles */
        #card-detail { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); 
            display:none; align-items:center; justify-content:center; z-index: 1000; 
        }
        #card-detail.open { display: flex; }
        #card-detail-inner { background: #111; width: 85%; max-width: 350px; border-radius: 20px; padding: 30px; border: 1px solid #333; }
        .btn { padding: 15px 40px; background: #fff; color: #000; border-radius: 30px; font-weight: 600; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="menu-screen" class="screen">
    <div style="margin: auto; text-align: center;">
        <h1 style="font-size: 58px; letter-spacing: -2px; margin: 0;">HOLD</h1>
        <div id="col-prog" style="opacity: 0.5; font-size: 14px; margin-bottom: 30px;"></div>
        <div class="btn" id="start-btn">PLAY</div>
        <div class="btn" id="col-btn" style="background: #111; color: #fff; border: 1px solid #333; margin-top: 10px;">COLLECTION</div>
    </div>
</div>

<div id="collection-screen" class="screen hidden">
    <div style="padding: 60px 20px 10px; display: flex; justify-content: space-between; align-items: baseline;">
        <h2 style="margin:0">Vault</h2>
        <span id="col-count" style="opacity:0.4; font-size:12px">0 items</span>
        <span id="col-back" style="opacity:0.6; font-size:14px; cursor:pointer">Close</span>
    </div>
    <div id="col-empty" style="display:none; text-align:center; margin-top:100px; opacity:0.3;">Empty</div>
    <div class="col-grid" id="col-grid"></div>
</div>

<div id="card-detail">
    <div id="card-detail-inner">
        <div id="det-rarity" style="font-size: 12px; font-weight: 700;"></div>
        <h2 id="det-name" style="margin: 5px 0 15px; font-size: 28px;"></h2>
        <p id="det-desc" style="font-size: 14px; line-height: 1.5; color: #ccc; margin-bottom: 20px;"></p>
        <div id="det-meta" style="font-size: 11px; color: #555; border-top: 1px solid #222; padding-top: 15px;"></div>
        <div class="btn" id="det-close" style="margin-top: 25px; width: 100%; box-sizing: border-box;">GOT IT</div>
    </div>
</div>

<script>
// --- VERİLER VE AYARLAR ---
const RARITIES = [
    {id:'common', label:'COMMON', color:'#ffffff'},
    {id:'rare', label:'RARE', color:'#0070f3'},
    {id:'epic', label:'EPIC', color:'#7928ca'},
    {id:'legendary', label:'LEGENDARY', color:'#ff0080'},
    {id:'mythic', label:'MYTHIC', color:'#ff4d4d'}
];

const ITEM_DESC = {
    'Dead Cat': 'A brief, feeble bounce after a sharp decline — followed by continued selling.',
    'Bull Trap': 'Price broke higher, luring buyers in — then reversed sharply.',
    'Black Swan': 'An extreme, unexpected crash. Nobody saw it coming.',
    'Golden Cross': 'The 50-period average crossed above the 200-period average.',
    'Death Cross': 'The 50-period average crossed below the 200-period average.',
    'Short Squeeze': 'Too many traders were short. Forced buying created a violent spike.',
    'Infinity': 'A hockey stick. Flat for a long time — then a near-vertical explosion.',
    // ... Diğer tüm açıklamalar buraya eklenebilir
};

let collection = JSON.parse(localStorage.getItem('hold_col') || '[]');
const menuEl = document.getElementById('menu-screen');
const colEl = document.getElementById('collection-screen');
const colGrid = document.getElementById('col-grid');

// --- KAYDIRMA KONTROLÜ (KRİTİK KISIM) ---
let isScrolling = false;
let startY = 0;

colGrid.addEventListener('touchstart', (e) => {
    startY = e.touches[0].pageY;
    isScrolling = false;
}, { passive: true });

colGrid.addEventListener('touchmove', (e) => {
    if (Math.abs(e.touches[0].pageY - startY) > 6) {
        isScrolling = true; // Parmağı kaydırınca tıklama iptal olur
    }
}, { passive: true });

function handleCardTap(e) {
    if (isScrolling) return; // Kaydırma yapılıyorsa fonksiyon durur
    
    const card = e.target.closest('.col-card');
    if (!card) return;
    
    e.preventDefault();
    openCardDetail(parseInt(card.dataset.idx));
}

// Olay dinleyicileri
colGrid.addEventListener('touchend', handleCardTap);
colGrid.addEventListener('click', handleCardTap);

function renderCollection() {
    const empty = document.getElementById('col-empty');
    const count = document.getElementById('col-count');
    
    if (!collection.length) {
        colGrid.innerHTML = ''; empty.style.display = 'block';
        count.textContent = '0 items'; return;
    }
    
    empty.style.display = 'none';
    count.textContent = `${collection.length} items`;
    
    colGrid.innerHTML = collection.map((item, i) => {
        const rar = RARITIES.find(r => r.id === item.rarity) || RARITIES[0];
        return `<div class="col-card ${item.rarity}" style="border-color:${rar.color}22" data-idx="${i}">
            <div class="col-card-rarity" style="color:${rar.color}">${rar.label}</div>
            <div class="col-card-name" style="color:${rar.color}">${item.name}</div>
            <div style="font-size:10px; margin-top:auto; opacity:0.4">+${item.pnl || 0}</div>
        </div>`;
    }).join('');
}

function openCardDetail(i) {
    const item = collection[i];
    if (!item) return;
    const rar = RARITIES.find(r => r.id === item.rarity) || RARITIES[0];
    
    document.getElementById('det-rarity').textContent = rar.label;
    document.getElementById('det-rarity').style.color = rar.color;
    document.getElementById('det-name').textContent = item.name;
    document.getElementById('det-name').style.color = rar.color;
    document.getElementById('det-desc').textContent = ITEM_DESC[item.name] || 'Market pattern discovered.';
    document.getElementById('det-meta').innerHTML = `Date: ${item.date || 'Today'} · Profit: +${item.pnl || 0}`;
    
    document.getElementById('card-detail').classList.add('open');
}

// Kapatma İşlemleri
document.getElementById('det-close').onclick = () => document.getElementById('card-detail').classList.remove('open');
document.getElementById('card-detail').onclick = (e) => {
    if(e.target.id === 'card-detail') document.getElementById('card-detail').classList.remove('open');
};

// Menü Geçişleri
document.getElementById('col-btn').onclick = () => {
    menuEl.classList.add('hidden');
    renderCollection();
    colEl.classList.remove('hidden');
};
document.getElementById('col-back').onclick = () => {
    colEl.classList.add('hidden');
    menuEl.classList.remove('hidden');
};

// Servis İşçisi (Cache Temizliği İçin Önemli)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}
</script>
</body>
</html>
