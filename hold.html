<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOLD</title>
    <style>
        body {
            background: #080808;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            user-select: none;
        }
        .screen { position: absolute; width: 100%; max-width: 430px; height: 100%; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        #collection-screen { background: #000; overflow-y: auto; }
        .col-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
        .col-item { aspect-ratio: 2/3; background: #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #222; }
        .col-item.locked { opacity: 0.3; }
        .btn { padding: 15px 40px; background: #fff; color: #000; border-radius: 30px; cursor: pointer; text-align: center; margin: 10px; }
    </style>
</head>
<body>

<div id="menu-screen" class="screen">
    <div style="margin: auto; text-align: center;">
        <h1 style="font-size: 48px;">HOLD</h1>
        <div id="col-prog"></div>
        <div class="btn" id="start-btn">PLAY</div>
        <div class="btn" id="col-btn">COLLECTION</div>
    </div>
</div>

<div id="collection-screen" class="screen hidden">
    <div style="padding: 40px 20px 10px; display: flex; justify-content: space-between;">
        <h2>Items</h2>
        <span id="col-back" style="cursor:pointer">Back</span>
    </div>
    <div class="col-grid" id="col-grid"></div>
</div>

<script>
// Orijinal Veriler
const items = Array.from({length: 25}, (_, i) => ({id: i+1, icon: '💎'}));
let collection = JSON.parse(localStorage.getItem('hold_col') || '[]');

const menuEl = document.getElementById('menu-screen');
const colEl = document.getElementById('collection-screen');
const colGrid = document.getElementById('col-grid');

function renderCollection() {
    colGrid.innerHTML = '';
    let startY = 0;
    let moving = false;

    items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'col-item' + (collection.includes(item.id) ? '' : ' locked');
        div.textContent = collection.includes(item.id) ? item.icon : '?';

        // KAYDIRMA SORUNUNU ÇÖZEN EN BASİT MANTIK (BAŞKA YERİ BOZMAZ)
        div.addEventListener('touchstart', (e) => { startY = e.touches[0].pageY; moving = false; }, {passive: true});
        div.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].pageY - startY) > 10) moving = true; }, {passive: true});
        div.addEventListener('touchend', () => {
            if (!moving && collection.includes(item.id)) {
                alert("Item " + item.id);
            }
        });

        colGrid.appendChild(div);
    });
}

document.getElementById('col-btn').onclick = () => {
    menuEl.classList.add('hidden');
    renderCollection();
    colEl.classList.remove('hidden');
};

document.getElementById('col-back').onclick = () => {
    colEl.classList.add('hidden');
    menuEl.classList.remove('hidden');
};

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
