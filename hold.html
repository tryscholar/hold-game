<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOLD</title>
    <style>
        /* Kaydırma sırasında kartların tetiklenmesini engelleyen sihirli dokunuş */
        .scrolling-active .col-item {
            pointer-events: none !important;
        }
    </style>
    </head>
<body>
    <script>
    // Oyunun orijinal tüm kodları burada kalsın...
    // Sadece 'renderCollection' fonksiyonunu bul ve şu şekilde güncelle:

    function renderCollection() {
        const colGrid = document.getElementById('col-grid');
        colGrid.innerHTML = '';
        
        // Kaydırma kontrolü için basit bir kilit
        let isMoving = false;
        let startY = 0;

        // Grid alanına kaydırma dinleyicisi ekle
        colGrid.addEventListener('touchstart', (e) => {
            startY = e.touches[0].pageY;
            isMoving = false;
        }, {passive: true});

        colGrid.addEventListener('touchmove', (e) => {
            if (Math.abs(e.touches[0].pageY - startY) > 5) {
                isMoving = true; 
                // Kaydırma başladığı an kartları tıklamaya kapat
                document.body.classList.add('scrolling-active');
            }
        }, {passive: true});

        colGrid.addEventListener('touchend', () => {
            // Kaydırma bittiğinde biraz bekle ve kilidi aç
            setTimeout(() => {
                isMoving = false;
                document.body.classList.remove('scrolling-active');
            }, 50);
        });

        for (let i = 1; i <= 25; i++) {
            const item = items.find(it => it.id === i);
            const div = document.createElement('div');
            div.className = 'col-item' + (collection.includes(i) ? '' : ' locked');
            
            if (collection.includes(i) && item) {
                div.textContent = item.icon;
                
                // Tıklama olayı sadece parmağını kaydırmadıysan çalışacak
                div.onclick = () => {
                    if (!isMoving) {
                        showDetails(item);
                    }
                };
            } else {
                div.textContent = '?';
            }
            colGrid.appendChild(div);
        }
    }
</script>
</body>
</html>
